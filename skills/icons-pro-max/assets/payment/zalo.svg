<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Zalo">
  <!-- White rounded square background -->
  <rect width="100" height="100" rx="24" fill="white"/>
  <!-- Blue Zalo brand color background shape (chat bubble style) -->
  <rect x="6" y="6" width="88" height="88" rx="18" fill="#0068FF"/>
  <!-- White "Z" letter -->
  <text
    x="50"
    y="68"
    font-family="Arial, Helvetica, sans-serif"
    font-size="52"
    font-weight="900"
    fill="white"
    text-anchor="middle"
    dominant-baseline="auto"
  >Z</text>
  <!-- White "alo" text -->
  <text
    x="66"
    y="68"
    font-family="Arial, Helvetica, sans-serif"
    font-size="28"
    font-weight="700"
    fill="white"
    text-anchor="start"
    dominant-baseline="auto"
  >alo</text>
</svg>
